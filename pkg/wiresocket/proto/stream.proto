syntax = "proto3";

package wiresocket;

option go_package = "example.com/pulse/pulse/pkg/wiresocket/proto";

// Event is a single application-level event carried in a data stream.
//
// Wire encoding is NOT standard protobuf.  Each encoded Event body starts
// with a raw uint8 type byte (1 byte, always present), followed by the
// remaining fields in standard protobuf varint/LEN format.  Field number 3
// is reserved for the type byte and does not appear as a proto field tag on
// the wire.
//
//   [uint8 type]  [field 1: sequence]  [field 2: timestamp_us]
//   [field 4: payload]  [field 5: channel_id]
//
// Zero-valued fields (other than type) are omitted from the wire.
message Event {
  // Monotonically increasing sequence number assigned by the sender.
  uint64 sequence = 1;

  // Unix timestamp in microseconds when the event was produced.
  int64 timestamp_us = 2;

  // Field 3 is reserved: the event type is encoded as a raw uint8 byte
  // preceding the proto-encoded fields, not as a standard proto field tag.
  reserved 3;
  reserved "type";

  // Opaque binary payload.
  bytes payload = 4;

  // Logical channel identifier for multiplexing multiple streams over a single
  // connection.  0 is the default channel (omitted on the wire when zero).
  uint32 channel_id = 5;
}

// Frame batches one or more events into a single encrypted UDP payload.
// The server and client exchange Frames; each Frame is encrypted as a unit.
message Frame {
  repeated Event events = 1;
}
